version: "1.0"
name: food-delivery-nextjs
services:
  db:
    image: postgres
    container_name: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb

    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
